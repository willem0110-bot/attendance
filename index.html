<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>教師出缺勤系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    * { font-family: 'Noto Sans TC', sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .glass-card { background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3); }
    .btn-punch { transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
    .btn-punch:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .modal-overlay { animation: fadeIn 0.25s ease; }
    .modal-content { animation: slideUp 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .tab-btn { transition: all 0.2s ease; }
    .tab-btn.active { background: white; color: #6366f1; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .tab-btn:not(.active) { background: transparent; color: rgba(255,255,255,0.7); }
    .leave-type-btn { transition: all 0.15s ease; }
    .leave-type-btn.selected { background: #6366f1; color: white; border-color: #6366f1; }
    .leave-type-btn:not(.selected) { background: white; color: #374151; border-color: #e5e7eb; }
  </style>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      brand: { DEFAULT: '#6366f1', light: '#818cf8', dark: '#4f46e5' },
      clockin: { DEFAULT: '#10b981', dark: '#059669' },
      lunchout: { DEFAULT: '#f59e0b', dark: '#d97706' },
      lunchin: { DEFAULT: '#3b82f6', dark: '#2563eb' },
      clockout: { DEFAULT: '#ef4444', dark: '#dc2626' },
      leave: { DEFAULT: '#8b5cf6', dark: '#7c3aed' },
    }}}};
  </script>
</head>
<body class="flex items-center justify-center p-4">
  <div id="app" class="w-full max-w-md">
    <div id="screen-loading" class="glass-card rounded-3xl p-8 text-center">
      <div class="text-6xl mb-4">🏫</div>
      <h1 class="text-xl font-bold text-gray-800 mb-2">教師出缺勤系統</h1>
      <p class="text-gray-500 text-sm mb-6">正在初始化 LINE 登入...</p>
      <div class="flex justify-center"><div class="spinner" style="border-color: rgba(99,102,241,0.2); border-top-color: #6366f1;"></div></div>
    </div>
    <div id="screen-bind" class="glass-card rounded-3xl p-8 hidden">
      <div class="text-center mb-6">
        <div class="text-5xl mb-3">👋</div>
        <h2 class="text-xl font-bold text-gray-800">歡迎！首次使用請先綁定</h2>
        <p class="text-gray-500 text-sm mt-1">請輸入您的真實姓名以完成註冊</p>
      </div>
      <div class="space-y-4">
        <input id="input-name" type="text" placeholder="例如：王小明" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-brand focus:outline-none text-lg text-center" maxlength="20" />
        <button onclick="handleBind()" id="btn-bind" class="w-full py-3 bg-brand text-white font-bold text-lg rounded-xl btn-punch hover:bg-brand-dark">確認綁定</button>
      </div>
    </div>
    <div id="screen-main" class="hidden space-y-4">
      <div class="glass-card rounded-3xl p-6">
        <div class="flex items-center justify-between mb-4">
          <div><p class="text-sm text-gray-500">歡迎回來</p><h2 id="display-name" class="text-2xl font-black text-gray-800"></h2></div>
          <div class="w-12 h-12 rounded-full bg-brand/10 flex items-center justify-center text-2xl">👩‍🏫</div>
        </div>
        <div class="bg-gray-50 rounded-2xl p-4 text-center">
          <p id="display-date" class="text-sm text-gray-500 font-medium"></p>
          <p id="display-time" class="text-4xl font-black text-gray-800 tracking-wider mt-1"></p>
        </div>
        <div class="flex items-center gap-2 mt-3 text-xs text-gray-400"><span class="status-dot bg-green-400"></span><span>系統運作正常</span></div>
      </div>
      <div class="flex gap-2 bg-white/20 rounded-2xl p-1">
        <button onclick="switchTab('punch')" id="tab-punch" class="tab-btn active flex-1 py-2.5 rounded-xl font-bold text-sm text-center">📍 打卡</button>
        <button onclick="switchTab('leave')" id="tab-leave" class="tab-btn flex-1 py-2.5 rounded-xl font-bold text-sm text-center">📋 請假</button>
      </div>
      <div id="panel-punch" class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <button onclick="handlePunch('上班')" class="btn-punch glass-card rounded-2xl p-5 text-center group"><div class="w-14 h-14 mx-auto rounded-2xl bg-clockin/10 flex items-center justify-center text-3xl mb-3 group-active:bg-clockin/20">☀️</div><span class="font-bold text-gray-800 text-lg">上班</span><p class="text-xs text-gray-400 mt-1">Clock In</p></button>
          <button onclick="handlePunch('午休外出')" class="btn-punch glass-card rounded-2xl p-5 text-center group"><div class="w-14 h-14 mx-auto rounded-2xl bg-lunchout/10 flex items-center justify-center text-3xl mb-3 group-active:bg-lunchout/20">🍱</div><span class="font-bold text-gray-800 text-lg">午休外出</span><p class="text-xs text-gray-400 mt-1">Lunch Out</p></button>
          <button onclick="handlePunch('午休返回')" class="btn-punch glass-card rounded-2xl p-5 text-center group"><div class="w-14 h-14 mx-auto rounded-2xl bg-lunchin/10 flex items-center justify-center text-3xl mb-3 group-active:bg-lunchin/20">🔙</div><span class="font-bold text-gray-800 text-lg">午休返回</span><p class="text-xs text-gray-400 mt-1">Lunch In</p></button>
          <button onclick="handlePunch('下班')" class="btn-punch glass-card rounded-2xl p-5 text-center group"><div class="w-14 h-14 mx-auto rounded-2xl bg-clockout/10 flex items-center justify-center text-3xl mb-3 group-active:bg-clockout/20">🌙</div><span class="font-bold text-gray-800 text-lg">下班</span><p class="text-xs text-gray-400 mt-1">Clock Out</p></button>
        </div>
        <p class="text-center text-xs text-white/60 pt-1">📍 打卡時將自動驗證您的所在位置</p>
      </div>
      <div id="panel-leave" class="hidden">
        <div class="glass-card rounded-2xl p-6 space-y-5">
          <div class="text-center"><div class="text-3xl mb-2">📝</div><h3 class="font-bold text-gray-800 text-lg">請假申請</h3></div>
          <div><label class="block text-sm font-bold text-gray-600 mb-2">假別</label>
            <div class="grid grid-cols-4 gap-2" id="leave-type-grid">
              <button onclick="selectLeaveType(this,'事假')" class="leave-type-btn border-2 rounded-xl py-2 text-sm font-medium">事假</button>
              <button onclick="selectLeaveType(this,'病假')" class="leave-type-btn border-2 rounded-xl py-2 text-sm font-medium">病假</button>
              <button onclick="selectLeaveType(this,'特休')" class="leave-type-btn border-2 rounded-xl py-2 text-sm font-medium">特休</button>
              <button onclick="selectLeaveType(this,'公假')" class="leave-type-btn border-2 rounded-xl py-2 text-sm font-medium">公假</button>
              <button onclick="selectLeaveType(this,'喪假')" class="leave-type-btn border-2 rounded-xl py-2 text-sm font-medium">喪假</button>
              <button onclick="selectLeaveType(this,'婚假')" class="leave-type-btn border-2 rounded-xl py-2 text-sm font-medium">婚假</button>
              <button onclick="selectLeaveType(this,'產假')" class="leave-type-btn border-2 rounded-xl py-2 text-sm font-medium">產假</button>
              <button onclick="selectLeaveType(this,'其他')" class="leave-type-btn border-2 rounded-xl py-2 text-sm font-medium">其他</button>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div><label class="block text-sm font-bold text-gray-600 mb-2">開始日期</label><input type="date" id="leave-start" class="w-full px-3 py-2.5 rounded-xl border-2 border-gray-200 focus:border-brand focus:outline-none text-sm" /></div>
            <div><label class="block text-sm font-bold text-gray-600 mb-2">結束日期</label><input type="date" id="leave-end" class="w-full px-3 py-2.5 rounded-xl border-2 border-gray-200 focus:border-brand focus:outline-none text-sm" /></div>
          </div>
          <div><label class="block text-sm font-bold text-gray-600 mb-2">事由 / 備註</label><textarea id="leave-note" rows="2" placeholder="請簡述請假原因（選填）" class="w-full px-3 py-2.5 rounded-xl border-2 border-gray-200 focus:border-brand focus:outline-none text-sm resize-none"></textarea></div>
          <button onclick="handleLeave()" id="btn-leave" class="w-full py-3 bg-leave text-white font-bold text-lg rounded-xl btn-punch hover:bg-leave-dark">送出請假申請</button>
        </div>
        <p class="text-center text-xs text-white/60 pt-3">📋 請假不需要定位，隨時隨地都可申請</p>
      </div>
    </div>
  </div>
  <div id="modal" class="fixed inset-0 z-50 hidden">
    <div class="modal-overlay absolute inset-0 bg-black/40 flex items-center justify-center p-6">
      <div class="modal-content glass-card rounded-3xl p-8 w-full max-w-sm text-center">
        <div id="modal-icon" class="text-6xl mb-4"></div>
        <h3 id="modal-title" class="text-xl font-bold text-gray-800 mb-2"></h3>
        <p id="modal-message" class="text-gray-600 text-sm mb-2"></p>
        <p id="modal-detail" class="text-gray-400 text-xs mb-6"></p>
        <button onclick="closeModal()" class="w-full py-3 bg-brand text-white font-bold rounded-xl btn-punch">確認</button>
      </div>
    </div>
  </div>
  <script>
    const LIFF_ID="2009933933-4NDQGy6k";
    const GAS_URL="https://script.google.com/macros/s/AKfycbzAcOALIahXzmd3M2aLSVsmAUjAUkqyfEKOAWed0sRN1k2F5wMHsRacQ3r3Ql4Go0r-Xw/exec";
    let userId=null,userName=null,selectedLeaveType="";
    async function init(){try{await liff.init({liffId:LIFF_ID});if(!liff.isLoggedIn()){liff.login();return}const p=await liff.getProfile();userId=p.userId;const r=await postToGAS({uid:userId,action:"check",lat:0,lon:0});if(r.status==="unregistered"){showScreen("bind")}else{userName=r.name||"老師";showMainScreen()}}catch(e){console.error("Init error:",e);userId="dev_test_uid";showScreen("bind")}}
    function showScreen(n){document.getElementById("screen-loading").classList.add("hidden");document.getElementById("screen-bind").classList.add("hidden");document.getElementById("screen-main").classList.add("hidden");document.getElementById("screen-"+n).classList.remove("hidden")}
    function showMainScreen(){document.getElementById("display-name").textContent=userName+" 老師您好";showScreen("main");updateClock();setInterval(updateClock,1000);const t=new Date().toISOString().split("T")[0];document.getElementById("leave-start").value=t;document.getElementById("leave-end").value=t}
    function switchTab(t){document.getElementById("tab-punch").classList.toggle("active",t==="punch");document.getElementById("tab-leave").classList.toggle("active",t==="leave");document.getElementById("panel-punch").classList.toggle("hidden",t!=="punch");document.getElementById("panel-leave").classList.toggle("hidden",t!=="leave")}
    function selectLeaveType(b,t){selectedLeaveType=t;document.querySelectorAll(".leave-type-btn").forEach(x=>x.classList.remove("selected"));b.classList.add("selected")}
    function updateClock(){const n=new Date(),w=["日","一","二","三","四","五","六"];document.getElementById("display-date").textContent=n.getFullYear()+" / "+String(n.getMonth()+1).padStart(2,"0")+" / "+String(n.getDate()).padStart(2,"0")+"（"+w[n.getDay()]+"）";document.getElementById("display-time").textContent=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0")+":"+String(n.getSeconds()).padStart(2,"0")}
    async function handleBind(){const n=document.getElementById("input-name").value.trim();if(!n){showModal("⚠️","請輸入姓名","請填寫您的真實姓名以完成綁定","");return}const b=document.getElementById("btn-bind");b.disabled=true;b.innerHTML='<span class="spinner"><\/span> 綁定中...';try{const r=await postToGAS({uid:userId,action:"bind",lat:0,lon:0,bindName:n});if(r.status==="ok"){userName=r.name;showModal("🎉","綁定成功！",userName+" 老師，歡迎使用出缺勤系統","");document.querySelector("#modal button").onclick=()=>{closeModal();showMainScreen()}}else{showModal("❌","綁定失敗",r.message||"請稍後再試","")}}catch(e){showModal("❌","網路錯誤","無法連線到伺服器，請檢查網路","")}finally{b.disabled=false;b.textContent="確認綁定"}}
    async function handlePunch(a){showModal("⏳","定位中...","正在取得您的 GPS 位置","請稍候");try{const p=await getLocation();document.getElementById("modal-title").textContent="傳送中...";document.getElementById("modal-message").textContent="正在提交打卡資料";const r=await postToGAS({uid:userId,action:a,lat:p.lat,lon:p.lon});if(r.status==="ok"){showModal("✅",a+" 打卡成功",r.message,"打卡時間："+r.time+" ｜ 距離學校："+r.distance+"m")}else{showModal("🚫","打卡失敗",r.message||"發生未知錯誤",r.distance?"目前距離學校："+Math.round(r.distance)+" 公尺":"")}}catch(e){showModal("📍","定位失敗",e.message||"無法取得位置，請確認已開啟 GPS","")}}
    async function handleLeave(){if(!selectedLeaveType){showModal("⚠️","請選擇假別","請先點選一種假別","");return}const s=document.getElementById("leave-start").value,e=document.getElementById("leave-end").value,n=document.getElementById("leave-note").value.trim();if(!s||!e){showModal("⚠️","請選擇日期","請填寫開始和結束日期","");return}if(e<s){showModal("⚠️","日期錯誤","結束日期不能早於開始日期","");return}const b=document.getElementById("btn-leave");b.disabled=true;b.innerHTML='<span class="spinner"><\/span> 送出中...';try{const r=await postToGAS({uid:userId,action:"leave",lat:0,lon:0,leaveType:selectedLeaveType,leaveStart:s,leaveEnd:e,leaveNote:n});if(r.status==="ok"){showModal("✅","請假申請已送出",r.message,selectedLeaveType+"："+s+" 至 "+e);selectedLeaveType="";document.querySelectorAll(".leave-type-btn").forEach(x=>x.classList.remove("selected"));document.getElementById("leave-note").value=""}else{showModal("❌","請假失敗",r.message||"請稍後再試","")}}catch(e){showModal("❌","網路錯誤","無法連線到伺服器，請檢查網路","")}finally{b.disabled=false;b.textContent="送出請假申請"}}
    function getLocation(){return new Promise((res,rej)=>{if(!navigator.geolocation){rej(new Error("您的裝置不支援 GPS 定位"));return}navigator.geolocation.getCurrentPosition(p=>{res({lat:p.coords.latitude,lon:p.coords.longitude})},e=>{const m={1:"您已拒絕定位權限，請至手機設定中開啟",2:"無法取得位置資訊，請到戶外重試",3:"定位逾時，請稍後重試"};rej(new Error(m[e.code]||"GPS 定位失敗"))},{enableHighAccuracy:true,timeout:15000,maximumAge:0})})}
    async function postToGAS(p){const r=await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(p)});return await r.json()}
    function showModal(i,t,m,d){document.getElementById("modal-icon").textContent=i;document.getElementById("modal-title").textContent=t;document.getElementById("modal-message").textContent=m;document.getElementById("modal-detail").textContent=d||"";document.getElementById("modal").classList.remove("hidden")}
    function closeModal(){document.getElementById("modal").classList.add("hidden")}
    window.addEventListener("load",init);
  </script>
</body>
</html>
