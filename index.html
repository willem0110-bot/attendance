    body::after{content:"";position:fixed;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(255,248,240,0.72) 0%,rgba(255,240,230,0.78) 50%,rgba(255,235,220,0.82) 100%)}
    .glass-card{background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.3)}
    .btn-punch{transition:all .2s ease;box-shadow:0 4px 15px rgba(0,0,0,0.15)}
    .btn-punch:active{transform:scale(0.95)}
    .modal-overlay{animation:fadeIn .25s ease}
    .modal-content{animation:slideUp .3s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .spinner{border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;width:20px;height:20px;animation:spin .6s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .tab-btn{transition:all .2s ease}.tab-btn.active{background:#fff;color:#6366f1;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.tab-btn:not(.active){background:transparent;color:rgba(255,255,255,0.7)}
    select,input[type="datetime-local"]{-webkit-appearance:none}
    .status-badge{display:inline-block;padding:2px 8px;border-radius:9999px;font-size:0.7rem;font-weight:700}
    .status-pending{background:#fef3c7;color:#92400e}.status-approved{background:#d1fae5;color:#065f46}.status-rejected{background:#fee2e2;color:#991b1b}
  </style>
  <script>tailwind.config={theme:{extend:{colors:{brand:{DEFAULT:'#6366f1',light:'#818cf8',dark:'#4f46e5'},clockin:{DEFAULT:'#10b981',dark:'#059669'},lunchout:{DEFAULT:'#f59e0b',dark:'#d97706'},lunchin:{DEFAULT:'#3b82f6',dark:'#2563eb'},clockout:{DEFAULT:'#ef4444',dark:'#dc2626'},leave:{DEFAULT:'#8b5cf6',dark:'#7c3aed'}}}}};</script>
</head>
<body class="flex items-center justify-center p-4">
<div id="app" class="w-full max-w-md">
  <div id="screen-loading" class="glass-card rounded-3xl p-8 text-center"><img src="logo.png" class="w-20 h-20 mx-auto rounded-full mb-4" alt="星安幼兒園" /><h1 class="text-xl font-bold text-gray-800 mb-2">星安幼兒園出缺勤系統</h1><p class="text-gray-500 text-sm mb-6">正在初始化 LINE 登入...</p><div class="flex justify-center"><div class="spinner" style="border-color:rgba(99,102,241,0.2);border-top-color:#6366f1"></div></div></div>
  <div id="screen-bind" class="glass-card rounded-3xl p-8 hidden"><div class="text-center mb-6"><div class="text-5xl mb-3">👋</div><h2 class="text-xl font-bold text-gray-800">歡迎！首次使用請先綁定</h2><p class="text-gray-500 text-sm mt-1">請輸入您的真實姓名以完成註冊</p></div><div class="space-y-4"><input id="input-name" type="text" placeholder="例如：王小明" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-brand focus:outline-none text-lg text-center" maxlength="20" /><div class="text-left"><label class="text-sm text-gray-600 font-medium ml-1">部門</label><select id="input-department" class="w-full px-4 py-3 mt-1 rounded-xl border-2 border-gray-200 focus:border-brand focus:outline-none text-lg bg-white" onchange="updateRoleOptions()"><option value="">請選擇部門</option><option value="幼兒部">幼兒部</option><option value="托嬰中心">托嬰中心</option><option value="才藝部">才藝部</option><option value="運動教室">運動教室</option></select></div><div class="text-left"><label class="text-sm text-gray-600 font-medium ml-1">角色</label><select id="input-role" class="w-full px-4 py-3 mt-1 rounded-xl border-2 border-gray-200 focus:border-brand focus:outline-none text-lg bg-white disabled:bg-gray-100 disabled:text-gray-400" disabled><option value="">請先選擇部門</option></select></div><div class="text-left"><label class="text-sm text-gray-600 font-medium ml-1">到職日期</label><input id="input-hire-date" type="date" class="w-full px-4 py-3 mt-1 rounded-xl border-2 border-gray-200 focus:border-brand focus:outline-none text-lg text-center" /><p class="text-xs text-gray-400 mt-1 ml-1">⚠️ 確認後不可自行修改</p></div><button onclick="handleBind()" id="btn-bind" class="w-full py-3 bg-brand text-white font-bold text-lg rounded-xl btn-punch">確認綁定</button></div></div>
  <div id="screen-main" class="hidden space-y-4">
    <div class="glass-card rounded-3xl p-6"><div class="flex items-center justify-between mb-4"><div><p class="text-sm text-gray-500">歡迎回來</p><h2 id="display-name" class="text-2xl font-black text-gray-800"></h2></div><img src="logo.png" class="w-12 h-12 rounded-full object-cover" alt="星安" /></div><div class="bg-gray-50 rounded-2xl p-4 text-center"><p id="display-date" class="text-sm text-gray-500 font-medium"></p><p id="display-time" class="text-4xl font-black text-gray-800 tracking-wider mt-1"></p></div><div id="quota-bar" class="hidden mt-3 grid grid-cols-2 gap-2">
        <div class="bg-purple-50 rounded-xl p-2.5 border border-purple-100">
          <div class="text-[10px] text-gray-500 font-medium tracking-wider">特休餘額</div>
          <div class="flex items-baseline gap-1 mt-0.5">
            <strong id="quota-left" class="text-xl font-black text-brand">-</strong>
            <span class="text-xs text-gray-500">天</span>
          </div>
          <div class="text-[10px] text-gray-400 mt-0.5">總額 <span id="quota-total">-</span> 天</div>
        </div>
        <div class="bg-amber-50 rounded-xl p-2.5 border border-amber-100">
          <div class="text-[10px] text-gray-500 font-medium tracking-wider">年資</div>
          <div class="flex items-baseline gap-1 mt-0.5">
            <strong id="seniority-text" class="text-xl font-black text-amber-700">-</strong>
          </div>
          <div class="text-[10px] text-gray-400 mt-0.5">到職 <span id="hire-date-text">-</span></div>
        </div>
      </div><div class="flex items-center gap-2 mt-2 text-xs text-gray-400"><span class="status-dot bg-green-400"></span><span>系統運作正常</span></div></div>
    <div class="flex gap-2 bg-white/20 rounded-2xl p-1"><button onclick="switchTab('punch')" id="tab-punch" class="tab-btn active flex-1 py-2.5 rounded-xl font-bold text-sm text-center">📍 打卡</button><button onclick="switchTab('leave')" id="tab-leave" class="tab-btn flex-1 py-2.5 rounded-xl font-bold text-sm text-center">📋 請假</button><button onclick="switchTab('history')" id="tab-history" class="tab-btn flex-1 py-2.5 rounded-xl font-bold text-sm text-center">📄 紀錄</button></div>
    <div id="panel-punch" class="space-y-3"><div class="grid grid-cols-2 gap-3"><button onclick="handlePunch('上班')" class="btn-punch glass-card rounded-2xl p-5 text-center"><div class="w-14 h-14 mx-auto rounded-2xl bg-clockin/10 flex items-center justify-center text-3xl mb-3">☀️</div><span class="font-bold text-gray-800 text-lg">上班</span><p class="text-xs text-gray-400 mt-1">Clock In</p></button><button onclick="handlePunch('午休外出')" class="btn-punch glass-card rounded-2xl p-5 text-center"><div class="w-14 h-14 mx-auto rounded-2xl bg-lunchout/10 flex items-center justify-center text-3xl mb-3">🍱</div><span class="font-bold text-gray-800 text-lg">午休外出</span><p class="text-xs text-gray-400 mt-1">Lunch Out</p></button><button onclick="handlePunch('午休返回')" class="btn-punch glass-card rounded-2xl p-5 text-center"><div class="w-14 h-14 mx-auto rounded-2xl bg-lunchin/10 flex items-center justify-center text-3xl mb-3">🔙</div><span class="font-bold text-gray-800 text-lg">午休返回</span><p class="text-xs text-gray-400 mt-1">Lunch In</p></button><button onclick="handlePunch('下班')" class="btn-punch glass-card rounded-2xl p-5 text-center"><div class="w-14 h-14 mx-auto rounded-2xl bg-clockout/10 flex items-center justify-center text-3xl mb-3">🌙</div><span class="font-bold text-gray-800 text-lg">下班</span><p class="text-xs text-gray-400 mt-1">Clock Out</p></button></div><p class="text-center text-xs text-white/60 pt-1">📍 打卡時將自動驗證您的所在位置</p></div>
    <div id="panel-leave" class="hidden"><div class="glass-card rounded-2xl p-5 space-y-4"><div class="text-center"><div class="text-2xl mb-1">📝</div><h3 class="font-bold text-gray-800">請假申請</h3></div><div><label class="block text-xs font-bold text-gray-600 mb-1.5">假別</label><select id="leave-type" class="w-full px-3 py-2.5 rounded-xl border-2 border-gray-200 focus:border-brand focus:outline-none text-sm bg-white"><option value="">請選擇假別</option><option value="事假">事假（無薪）</option><option value="半薪病假">半薪病假</option><option value="特休">特休（全薪）</option><option value="生理假">生理假（每月1日）</option><option value="產檢假">產檢假</option><option value="婚假">婚假</option><option value="喪假">喪假</option></select></div><div class="grid grid-cols-2 gap-3"><div><label class="block text-xs font-bold text-gray-600 mb-1.5">開始時間</label><input type="datetime-local" id="leave-start" class="w-full px-3 py-2.5 rounded-xl border-2 border-gray-200 focus:border-brand focus:outline-none text-sm" /></div><div><label class="block text-xs font-bold text-gray-600 mb-1.5">結束時間</label><input type="datetime-local" id="leave-end" class="w-full px-3 py-2.5 rounded-xl border-2 border-gray-200 focus:border-brand focus:outline-none text-sm" /></div></div><div><label class="block text-xs font-bold text-gray-600 mb-1.5">事由</label><textarea id="leave-note" rows="2" placeholder="請簡述請假原因" class="w-full px-3 py-2.5 rounded-xl border-2 border-gray-200 focus:border-brand focus:outline-none text-sm resize-none"></textarea></div><button onclick="handleLeave()" id="btn-leave" class="w-full py-3 bg-leave text-white font-bold rounded-xl btn-punch">送出請假申請</button></div><p class="text-center text-xs text-white/60 pt-2">📋 請假不需定位 ｜ 特休與生理假有額度限制</p></div>
    <div id="panel-history" class="hidden"><div class="glass-card rounded-2xl p-5"><div class="text-center mb-3"><div class="text-2xl mb-1">📄</div><h3 class="font-bold text-gray-800">請假紀錄</h3></div><div id="leave-history" class="space-y-2 max-h-80 overflow-y-auto"><p class="text-center text-gray-400 text-sm py-4">載入中...</p></div></div></div>
  </div>
</div>
<div id="modal" class="fixed inset-0 z-50 hidden"><div class="modal-overlay absolute inset-0 bg-black/40 flex items-center justify-center p-6"><div class="modal-content glass-card rounded-3xl p-8 w-full max-w-sm text-center"><div id="modal-icon" class="text-6xl mb-4"></div><h3 id="modal-title" class="text-xl font-bold text-gray-800 mb-2"></h3><p id="modal-message" class="text-gray-600 text-sm mb-2"></p><p id="modal-detail" class="text-gray-400 text-xs mb-6"></p><button onclick="closeModal()" class="w-full py-3 bg-brand text-white font-bold rounded-xl btn-punch">確認</button></div></div></div>
<script>
const LIFF_ID="2009933933-4NDQGy6k",GAS_URL="https://script.google.com/macros/s/AKfycbzAcOALIahXzmd3M2aLSVsmAUjAUkqyfEKOAWed0sRN1k2F5wMHsRacQ3r3Ql4Go0r-Xw/exec";let userId=null,userName=null;
async function init(){try{await liff.init({liffId:LIFF_ID});if(!liff.isLoggedIn()){liff.login();return}const p=await liff.getProfile();userId=p.userId;const r=await postToGAS({uid:userId,action:"check",lat:0,lon:0});if(r.status==="unregistered")showScreen("bind");else{userName=r.name||"老師";showMainScreen(r.quota)}}catch(e){console.error(e);userId="dev_test_uid";showScreen("bind")}}
function showScreen(n){["loading","bind","main"].forEach(s=>document.getElementById("screen-"+s).classList.add("hidden"));document.getElementById("screen-"+n).classList.remove("hidden")}
function showMainScreen(q){document.getElementById("display-name").textContent=userName+" 老師您好";showScreen("main");updateClock();setInterval(updateClock,1000);const n=new Date(),p=n=>String(n).padStart(2,"0"),t=n.getFullYear()+"-"+p(n.getMonth()+1)+"-"+p(n.getDate());document.getElementById("leave-start").value=t+"T08:00";document.getElementById("leave-end").value=t+"T17:00";if(q){document.getElementById("quota-bar").classList.remove("hidden");document.getElementById("quota-left").textContent=q.annualLeft;document.getElementById("quota-total").textContent=q.annualTotal;if(q.seniorityText){document.getElementById("seniority-text").textContent=q.seniorityText}else{document.getElementById("seniority-text").textContent="-"}if(q.hireDate){const hd=new Date(q.hireDate);if(!isNaN(hd)){document.getElementById("hire-date-text").textContent=hd.getFullYear()+"/"+(hd.getMonth()+1)+"/"+hd.getDate()}else{document.getElementById("hire-date-text").textContent=q.hireDate}}else{document.getElementById("hire-date-text").textContent="未設定"}}}
function switchTab(t){["punch","leave","history"].forEach(p=>{document.getElementById("tab-"+p).classList.toggle("active",p===t);document.getElementById("panel-"+p).classList.toggle("hidden",p!==t)});if(t==="history")loadHistory()}
function updateClock(){const n=new Date(),w=["日","一","二","三","四","五","六"];document.getElementById("display-date").textContent=n.getFullYear()+" / "+String(n.getMonth()+1).padStart(2,"0")+" / "+String(n.getDate()).padStart(2,"0")+"（"+w[n.getDay()]+"）";document.getElementById("display-time").textContent=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0")+":"+String(n.getSeconds()).padStart(2,"0")}
const DEPT_ROLES={"幼兒部":["老師","行政老師","清潔阿姨","廚房阿姨"],"托嬰中心":["主任","老師","行政老師","清潔阿姨","廚房阿姨"],"才藝部":["主任","老師","行政老師"],"運動教室":["主任","老師","行政老師"]};function updateRoleOptions(){const dept=document.getElementById("input-department").value;const sel=document.getElementById("input-role");sel.innerHTML='<option value="">請選擇角色</option>';if(DEPT_ROLES[dept]){DEPT_ROLES[dept].forEach(r=>{const opt=document.createElement("option");opt.value=r;opt.textContent=r;sel.appendChild(opt)});sel.disabled=false}else{sel.disabled=true}}async function handleBind(){const name=document.getElementById("input-name").value.trim();if(!name){showModal("⚠️","請輸入姓名","","");return}const dept=document.getElementById("input-department").value;if(!dept){showModal("⚠️","請選擇部門","","");return}const role=document.getElementById("input-role").value;if(!role){showModal("⚠️","請選擇角色","","");return}const hireDate=document.getElementById("input-hire-date").value;if(!hireDate){showModal("⚠️","請選擇到職日期","","");return}const btn=document.getElementById("btn-bind");btn.disabled=true;btn.innerHTML='<span class="spinner"><\/span> 綁定中...';try{const r=await postToGAS({uid:userId,action:"bind",lat:0,lon:0,bindName:name,department:dept,role:role,hireDate:hireDate});if(r.status==="ok"){userName=r.name;showModal("🎉","綁定成功！",userName+" 老師，歡迎使用","");document.querySelector("#modal button").onclick=()=>{closeModal();showMainScreen(null)}}else showModal("❌","綁定失敗",r.message||"","")}catch(e){showModal("❌","網路錯誤","","")}finally{btn.disabled=false;btn.textContent="確認綁定"}}
async function handlePunch(a){showModal("⏳","定位中...","GPS","");try{const p=await getLocation();document.getElementById("modal-title").textContent="傳送中...";const r=await postToGAS({uid:userId,action:a,lat:p.lat,lon:p.lon});if(r.status==="ok")showModal("✅",a+" 打卡成功",r.message,r.time+" | "+r.distance+"m");else showModal("🚫","打卡失敗",r.message||"",r.distance?Math.round(r.distance)+"m":"")}catch(e){showModal("📍","定位失敗",e.message||"","")}}
async function handleLeave(){const type=document.getElementById("leave-type").value,start=document.getElementById("leave-start").value,end=document.getElementById("leave-end").value,note=document.getElementById("leave-note").value.trim();if(!type){showModal("⚠️","請選擇假別","","");return}if(!start||!end){showModal("⚠️","請選擇時間","","");return}if(new Date(end)<=new Date(start)){showModal("⚠️","時間錯誤","結束時間必須晚於開始","");return}const btn=document.getElementById("btn-leave");btn.disabled=true;btn.innerHTML='<span class="spinner"><\/span> 送出中...';try{const r=await postToGAS({uid:userId,action:"leave",lat:0,lon:0,leaveType:type,leaveStart:start,leaveEnd:end,leaveNote:note});if(r.status==="ok"){showModal("✅","請假已送出",r.message,r.days+"天/"+r.hours+"hr");document.getElementById("leave-type").value="";document.getElementById("leave-note").value=""}else showModal("❌","申請失敗",r.message||"","")}catch(e){showModal("❌","網路錯誤","","")}finally{btn.disabled=false;btn.textContent="送出請假申請"}}
async function loadHistory(){const el=document.getElementById("leave-history");el.innerHTML='<p class="text-center text-gray-400 text-sm py-4">載入中...</p>';try{const r=await postToGAS({uid:userId,action:"myLeaves",lat:0,lon:0});if(r.status==="ok"&&r.leaves&&r.leaves.length>0){el.innerHTML=r.leaves.map(l=>{const b=l.status==="已核准"?"status-approved":l.status==="拒絕"?"status-rejected":"status-pending";return '<div class="bg-gray-50 rounded-xl p-3"><div class="flex justify-between items-center mb-1"><span class="font-bold text-sm text-gray-800">'+l.type+'</span><span class="status-badge '+b+'">'+l.status+'</span></div><p class="text-xs text-gray-500">'+l.start+' ~ '+l.end+'</p><p class="text-xs text-gray-400 mt-0.5">'+l.days+'天/'+l.hours+'hr'+(l.reason?' ・'+l.reason:'')+'</p>'+(l.remark?'<p class="text-xs text-brand mt-0.5">備註：'+l.remark+'</p>':'')+'</div>'}).join("")}else el.innerHTML='<p class="text-center text-gray-400 text-sm py-4">尚無請假紀錄</p>'}catch(e){el.innerHTML='<p class="text-center text-red-400 text-sm py-4">載入失敗</p>'}}
function getLocation(){return new Promise((res,rej)=>{if(!navigator.geolocation){rej(new Error("no GPS"));return}navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lon:p.coords.longitude}),e=>{const m={1:"拒絕定位",2:"無法定位",3:"逾時"};rej(new Error(m[e.code]||"GPS失敗"))},{enableHighAccuracy:true,timeout:15000,maximumAge:0})})}
async function postToGAS(p){const r=await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(p)});return await r.json()}
function showModal(i,t,m,d){document.getElementById("modal-icon").textContent=i;document.getElementById("modal-title").textContent=t;document.getElementById("modal-message").textContent=m;document.getElementById("modal-detail").textContent=d||"";document.getElementById("modal").classList.remove("hidden")}
function closeModal(){document.getElementById("modal").classList.add("hidden")}
window.addEventListener("load",init);
</script>
</body>
