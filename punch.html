<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星安快速打卡</title>
<script src="https://cdn.tailwindcss.com"></script>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Cormorant+Garamond:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<style>
  *{font-family:'Noto Sans TC',sans-serif;-webkit-tap-highlight-color:transparent}
  .serif{font-family:'Noto Serif TC',serif}
  .ital{font-family:'Cormorant Garamond',serif;font-style:italic}
  body{margin:0;min-height:100vh;background:#F7F3EA;color:#2A2622}
  .card{background:#FFFBF5;border:1px solid rgba(184,74,47,.08);border-radius:24px;box-shadow:0 8px 30px rgba(120,80,60,.06)}
  .brick{color:#B84A2F}
  .tabnum{font-variant-numeric:tabular-nums}
  .act{transition:transform .15s ease, box-shadow .2s ease}
  .act:active{transform:scale(.96)}
  .suggest{box-shadow:0 0 0 2px #B84A2F, 0 8px 22px rgba(184,74,47,.18)}
  .fade{animation:fade .3s ease}
  .rise{animation:rise .32s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
  .spin{width:26px;height:26px;border:3px solid rgba(184,74,47,.18);border-top-color:#B84A2F;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;background:#5C8F5C;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
</style>
</head>
<body class="flex items-center justify-center p-5">
<div class="w-full max-w-md">

  <!-- 載入中 -->
  <div id="screen-loading" class="card p-8 text-center fade">
    <img src="logo.png" onerror="this.style.display='none'" class="w-16 h-16 mx-auto rounded-full mb-4" alt="星安">
    <div class="ital text-sm tracking-widest brick mb-1">— quick clock —</div>
    <h1 class="serif text-xl font-bold mb-5">星安快速打卡</h1>
    <div class="spin"></div>
    <p id="loading-text" class="text-gray-500 text-sm mt-5">正在確認您的 LINE 身分…</p>
  </div>

  <!-- 提示／錯誤 -->
  <div id="screen-notice" class="card p-8 text-center hidden rise">
    <div id="notice-icon" class="text-5xl mb-3">📌</div>
    <h2 id="notice-title" class="serif text-xl font-bold mb-2"></h2>
    <p id="notice-body" class="text-gray-500 text-sm leading-relaxed"></p>
    <button id="notice-retry" onclick="init()" class="hidden mt-6 w-full py-3 rounded-2xl bg-[#B84A2F] text-white font-bold act">重新感應打卡</button>
  </div>

  <!-- 打卡主畫面 -->
  <div id="screen-punch" class="hidden space-y-4">
    <div class="card p-6 rise">
      <div class="flex items-center justify-between">
        <div>
          <div class="ital text-sm tracking-widest brick">— clock in / out —</div>
          <h2 class="serif text-2xl font-black mt-1"><span id="p-name"></span> 老師</h2>
        </div>
        <img src="logo.png" onerror="this.style.display='none'" class="w-12 h-12 rounded-full object-cover" alt="星安">
      </div>
      <div class="mt-4 rounded-2xl bg-[#F7F3EA] px-4 py-3 text-center">
        <p id="p-date" class="text-xs text-gray-500 font-medium"></p>
        <p id="p-clock" class="serif text-4xl font-black tabnum mt-0.5"></p>
      </div>
      <div class="flex items-center justify-between mt-3">
        <div class="flex items-center gap-2 text-xs text-gray-400"><span class="dot"></span><span>打卡時將自動驗證所在位置</span></div>
        <button onclick="fullLogout()" class="text-xs text-gray-400 underline underline-offset-2">換人</button>
      </div>
    </div>

    <div id="p-grid" class="grid grid-cols-2 gap-3 rise"></div>

    <p class="text-center text-xs text-gray-400 pt-1">感應後點一下即可打卡 · 系統自動記錄真實 LINE 身分</p>
  </div>

  <!-- 結果彈窗 -->
  <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6" style="background:rgba(42,38,34,.45)">
    <div class="card w-full max-w-xs p-7 text-center rise">
      <div id="m-icon" class="text-5xl mb-2"></div>
      <h3 id="m-title" class="serif text-xl font-bold"></h3>
      <p id="m-msg" class="text-sm text-gray-600 mt-1"></p>
      <p id="m-sub" class="tabnum text-sm text-gray-400 mt-1"></p>
      <button id="m-close" onclick="closeModal()" class="hidden mt-5 w-full py-2.5 rounded-2xl bg-[#F7F3EA] text-gray-700 font-bold act">完成</button>
    </div>
  </div>

</div>

<script>
/* ===== 設定 ===== */
// ⚠️ 這一行請換成「打卡專用」的新 LIFF ID（端點 URL 設 .../attendance/punch.html，需與教師出缺勤同一個 channel 2009933933）
const LIFF_ID = "2009933933-qlWpU94m";
const GAS_URL = "https://script.google.com/macros/s/AKfycbzAcOALIahXzmd3M2aLSVsmAUjAUkqyfEKOAWed0sRN1k2F5wMHsRacQ3r3Ql4Go0r-Xw/exec";
const IDLE_MS = 120000; // 閒置 2 分鐘自動清除身分

/* ===== 動作定義（沿用現有後端 action 名稱與粉彩配色）===== */
const ACTIONS = [
  { key: "上班",     en: "Clock In",  icon: "☀️", bg: "#E8F1E5" },
  { key: "午休外出", en: "Lunch Out", icon: "🍱", bg: "#FBE8D8" },
  { key: "午休返回", en: "Lunch In",  icon: "🔙", bg: "#E8E4F1" },
  { key: "下班",     en: "Clock Out", icon: "🌙", bg: "#FBE0DE" },
];

let userId = null, userName = "", gpsCache = null;
let lastActivity = Date.now(), idleCleared = false, clockTimer = null;

/* ===== 畫面切換 ===== */
function show(id){
  ["screen-loading","screen-notice","screen-punch"].forEach(s=>{
    document.getElementById(s).classList.toggle("hidden", s!==id);
  });
}
function notice(icon, title, body, retry){
  document.getElementById("notice-icon").textContent = icon;
  document.getElementById("notice-title").textContent = title;
  document.getElementById("notice-body").textContent = body;
  document.getElementById("notice-retry").classList.toggle("hidden", !retry);
  show("screen-notice");
}

/* ===== 後端通訊（與主系統相同）===== */
async function postToGAS(p){
  const r = await fetch(GAS_URL, { method:"POST", headers:{ "Content-Type":"text/plain" }, body: JSON.stringify(p) });
  return await r.json();
}

/* ===== 定位 ===== */
function getLocation(){
  return new Promise((res, rej)=>{
    if(!navigator.geolocation){ rej(new Error("此裝置不支援定位")); return; }
    navigator.geolocation.getCurrentPosition(
      p => res({ lat:p.coords.latitude, lon:p.coords.longitude }),
      e => { const m={1:"定位權限被拒絕",2:"目前無法定位",3:"定位逾時"}; rej(new Error(m[e.code]||"定位失敗")); },
      { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
    );
  });
}
async function prefetchGPS(){ try{ const p=await getLocation(); gpsCache={...p, ts:Date.now()}; }catch(e){} }
async function ensureGPS(){
  if(gpsCache && Date.now()-gpsCache.ts < 90000) return gpsCache;
  const p = await getLocation(); gpsCache = {...p, ts:Date.now()}; return gpsCache;
}

/* ===== 初始化 ===== */
async function init(){
  if(LIFF_ID.indexOf("___") !== -1){
    notice("🛠️", "尚未設定打卡 LIFF ID",
      "請先在 LINE Developers 建立打卡頁的 LIFF（端點設 punch.html），再把 LIFF ID 填入檔案頂端。", false);
    return;
  }
  document.getElementById("notice-retry").classList.add("hidden");
  document.getElementById("loading-text").textContent = "正在確認您的 LINE 身分…";
  show("screen-loading");
  idleCleared = false; lastActivity = Date.now();
  try{
    await liff.init({ liffId: LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    const prof = await liff.getProfile();
    userId = prof.userId;
    prefetchGPS(); // 背景先要定位，加快打卡
    const r = await postToGAS({ uid:userId, action:"check", lat:0, lon:0 });
    if(r && r.status === "unregistered"){
      notice("👋", "第一次使用，請先完成綁定",
        "請先開啟「教師出缺勤系統」完成註冊（部門／角色／到職日），之後就能用這張 QR 快速打卡。", false);
      return;
    }
    userName = (r && r.name) || "老師";
    renderPunch();
  }catch(e){
    notice("⚠️", "LINE 驗證失敗", (e && e.message) || "請完全關閉 LINE 後，重新掃描 QR 再試一次。", true);
  }
}

/* ===== 主畫面 ===== */
function suggested(){ return new Date().getHours() < 12 ? "上班" : "下班"; }

function renderPunch(){
  document.getElementById("p-name").textContent = userName;
  updateClock();
  if(clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(updateClock, 1000);

  const sug = suggested();
  const grid = document.getElementById("p-grid");
  grid.innerHTML = ACTIONS.map(a=>{
    const isSug = a.key === sug;
    return `<button onclick="doPunch('${a.key}')" class="act card p-5 text-center ${isSug?'suggest':''}">
      <div class="w-14 h-14 mx-auto rounded-2xl flex items-center justify-center text-3xl mb-3" style="background:${a.bg}">${a.icon}</div>
      <div class="serif font-bold text-lg">${a.key}</div>
      <div class="ital text-xs text-gray-400">${a.en}</div>
      ${isSug?'<div class="mt-1 text-[11px] font-bold brick">建議</div>':''}
    </button>`;
  }).join("");
  show("screen-punch");
}

function updateClock(){
  const n = new Date(), z = x => String(x).padStart(2,"0");
  const wk = ["日","一","二","三","四","五","六"][n.getDay()];
  document.getElementById("p-date").textContent = `${n.getFullYear()} 年 ${n.getMonth()+1} 月 ${n.getDate()} 日（${wk}）`;
  document.getElementById("p-clock").textContent = `${z(n.getHours())}:${z(n.getMinutes())}:${z(n.getSeconds())}`;
}

/* ===== 打卡 ===== */
function openModal(){ document.getElementById("modal").classList.remove("hidden"); }
function closeModal(){ document.getElementById("modal").classList.add("hidden"); }
function setModal(icon, title, msg, sub, closable){
  document.getElementById("m-icon").textContent = icon;
  document.getElementById("m-title").textContent = title;
  document.getElementById("m-msg").textContent = msg || "";
  document.getElementById("m-sub").textContent = sub || "";
  document.getElementById("m-close").classList.toggle("hidden", !closable);
}

async function doPunch(action){
  markActivity();
  setModal("⏳", "定位中…", "", "", false); openModal();
  try{
    const g = await ensureGPS();
    setModal("⏳", "傳送中…", "", "", false);
    const r = await postToGAS({ uid:userId, action, lat:g.lat, lon:g.lon });
    if(r && r.status === "ok"){
      const sub = (r.time || "") + (r.distance != null ? "  ·  距離 " + Math.round(r.distance) + " 公尺" : "");
      setModal("✅", action + " 打卡成功", (r.message || (userName + " 老師")), sub, true);
      setTimeout(()=>{ closeModal(); }, 6000);
    }else{
      setModal("🚫", "打卡未完成", (r && r.message) || "請稍後再試一次。", (r && r.distance != null) ? "距離 " + Math.round(r.distance) + " 公尺" : "", true);
    }
  }catch(e){
    setModal("📍", "定位失敗", (e && e.message) || "請確認已允許定位權限後再試。", "", true);
  }
}

/* ===== 閒置自動清除身分（共用裝置安全）===== */
function markActivity(){ lastActivity = Date.now(); }
function checkIdle(){
  if(idleCleared) return;
  if(Date.now() - lastActivity >= IDLE_MS){
    idleCleared = true;
    userId = null; userName = ""; gpsCache = null;
    if(clockTimer){ clearInterval(clockTimer); clockTimer = null; }
    closeModal();
    notice("🔒", "已自動登出", "為保護個人資料，閒置過久已清除身分。請點下方按鈕重新感應打卡。", true);
  }
}
["mousemove","mousedown","click","keydown","scroll","wheel","touchstart","touchmove","touchend","pointerdown"]
  .forEach(ev => window.addEventListener(ev, markActivity, { passive:true }));
setInterval(checkIdle, 15000);
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) checkIdle(); });
window.addEventListener("focus", checkIdle);

/* ===== 完全登出（換人）===== */
function fullLogout(){
  try{ if(window.liff && liff.logout) liff.logout(); }catch(e){}
  try{ sessionStorage.clear(); localStorage.clear(); }catch(e){}
  userId = null; userName = ""; gpsCache = null;
  history.replaceState(null, "", location.pathname);
  location.replace(location.pathname);
}

/* 啟動 */
init();
</script>
</body>
</html>
